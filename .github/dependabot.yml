version: 2

updates:

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 50
    assignees:
      - "guibranco"
    reviewers:
      - "guibranco"
    labels:
      - "npm"
      - "dependencies"
    groups:
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "react-router-dom"
          - "@floating-ui/react"
          - "@tanstack/react-query"
          - "lucide-react"
      eslint:
        patterns:
          - "eslint"
          - "@eslint/*"
          - "eslint-plugin-*"
          - "typescript-eslint"
          - "globals"
      typescript:
        patterns:
          - "typescript"
          - "@types/*"
      i18n:
        patterns:
          - "i18next"
          - "i18next-*"
          - "react-i18next"
      tailwind:
        patterns:
          - "tailwindcss"
          - "autoprefixer"
          - "postcss"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 50
    assignees:
      - "guibranco"
    reviewers:
      - "guibranco"
    labels:
      - "github-actions"
      - "dependencies"
